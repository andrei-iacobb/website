# Optimized Nginx configuration for SSR Next.js Portfolio
upstream portfolio_backend {
    server portfolio:3000;
    keepalive 32;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=30r/s;

server {
    listen 80;
    server_name localhost;
    
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/atom+xml
        application/json
        application/ld+json
        image/svg+xml;

    # Cache static assets aggressively
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|svg|woff|woff2|eot|ttf|otf)$ {
        limit_req zone=static burst=20 nodelay;
        proxy_pass http://portfolio_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache headers for static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # Enable compression
        gzip_static on;
    }

    # Next.js static files (from /_next/static/)
    location /_next/static/ {
        limit_req zone=static burst=20 nodelay;
        proxy_pass http://portfolio_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache Next.js static assets for 1 year
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API routes with rate limiting
    location /api/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://portfolio_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # No caching for API routes
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Main application (SSR pages)
    location / {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://portfolio_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Buffer settings for better performance
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Cache SSR pages briefly (can be disabled if needed)
        add_header Cache-Control "public, max-age=60, s-maxage=300";
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://portfolio_backend;
        proxy_set_header Host $host;
    }

    # Favicon handling
    location = /favicon.ico {
        limit_req zone=static burst=5 nodelay;
        proxy_pass http://portfolio_backend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Robots.txt
    location = /robots.txt {
        limit_req zone=static burst=5 nodelay;
        proxy_pass http://portfolio_backend;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Sitemap
    location = /sitemap.xml {
        limit_req zone=static burst=5 nodelay;
        proxy_pass http://portfolio_backend;
        expires 1h;
        add_header Cache-Control "public";
    }
}

